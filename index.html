<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pose Detector by william</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
    color:white;
}

.container{
    width:520px;
    padding:30px;
    border-radius:30px;
    backdrop-filter: blur(20px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
        0 0 40px rgba(0,0,0,.4),
        inset 0 0 20px rgba(255,255,255,.05);
    text-align:center;
}

h1{
    font-size:32px;
    margin-bottom:20px;
    background:linear-gradient(90deg,#38bdf8,#a78bfa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

button{
    width:100%;
    padding:16px;
    margin-top:12px;
    border:none;
    border-radius:16px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
}

#start-btn{
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
}

#stop-btn{
    background:linear-gradient(90deg,#ef4444,#dc2626);
    color:white;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(255,255,255,.15);
}

#status-message{
    margin:20px 0;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,.08);
    font-size:16px;
}

#top-result{
    margin:20px 0;
    font-size:34px;
    font-weight:900;
    color:#4ade80;
    text-shadow:0 0 20px #4ade80;
    min-height:50px;
}

canvas{
    border-radius:20px;
    border:3px solid rgba(255,255,255,.15);
    box-shadow:0 0 25px #38bdf8;
    margin-top:20px;
}

#label-container{
    margin-top:25px;
    text-align:left;
}

.result{
    background:rgba(255,255,255,.07);
    padding:14px;
    border-radius:14px;
    margin-bottom:12px;
    font-size:18px;
    backdrop-filter: blur(10px);
}
</style>
</head>
<body>

<div class="container">
    <h1>AI Pose Detector</h1>

    <button id="start-btn" onclick="init()">
        카메라 시작
    </button>

    <button id="stop-btn" onclick="stopCamera()">
        카메라 종료
    </button>

    <div id="status-message">
        카메라를 시작하세요
    </div>

    <div id="top-result">대기중...</div>

    <div id="canvas-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

<script>
const URL =
"https://teachablemachine.withgoogle.com/models/1p_zpwPrF/";

let model, webcam, ctx, canvas;
let labelContainer, maxPredictions;
let isRunning=false;

const statusDiv =
document.getElementById("status-message");

const topResult =
document.getElementById("top-result");

async function init(){
    if(isRunning) return;

    try{
        statusDiv.innerText="모델 로딩중...";

        document.getElementById(
            "start-btn"
        ).disabled=true;

        model=await tmPose.load(
            URL+"model.json",
            URL+"metadata.json"
        );

        maxPredictions=
            model.getTotalClasses();

        webcam=
            new tmPose.Webcam(
                320,320,true
            );

        await webcam.setup();
        await webcam.play();

        canvas=
            document.createElement("canvas");
        canvas.width=320;
        canvas.height=320;

        ctx=
            canvas.getContext("2d");

        const cc=
            document.getElementById(
                "canvas-container"
            );

        cc.innerHTML="";
        cc.appendChild(canvas);

        labelContainer=
            document.getElementById(
                "label-container"
            );

        labelContainer.innerHTML="";

        for(let i=0;i<maxPredictions;i++){
            const d=
                document.createElement("div");
            d.className="result";
            labelContainer.appendChild(d);
        }

        isRunning=true;
        statusDiv.innerText=
            "실시간 분석 중 ✅";

        requestAnimationFrame(loop);

    }catch(err){
        console.error(err);
        statusDiv.innerText=
            "카메라 권한 필요";
    }
}

async function loop(){
    if(!isRunning) return;

    webcam.update();
    await predict();

    requestAnimationFrame(loop);
}

async function predict(){

    const {pose,posenetOutput} =
        await model.estimatePose(
            webcam.canvas
        );

    const prediction=
        await model.predict(
            posenetOutput
        );

    drawPose(pose);

    let total=0;

    prediction.forEach(p=>{
        total+=p.probability;
    });

    let bestClass="";
    let bestProb=0;

    prediction.forEach((p,i)=>{

        const normalized=
            (p.probability/total)*100;

        const percent=
            normalized.toFixed(10);

        labelContainer
            .childNodes[i]
            .innerHTML=
            `${p.className}: ${percent}%`;

        if(normalized>bestProb){
            bestProb=normalized;
            bestClass=
                p.className
                .trim()
                .toLowerCase();
        }
    });

    if(bestProb>=70){

        if(bestClass==="standing")
            topResult.innerText=
                "🧍 Standing";

        else if(bestClass==="hello")
            topResult.innerText=
                "👋 Hello";

        else
            topResult.innerText=
                "✅ "+bestClass;

    }else{
        topResult.innerText=
            "판별 중...";
    }
}

function drawPose(pose){
    ctx.drawImage(
        webcam.canvas,
        0,0
    );

    if(pose){
        tmPose.drawKeypoints(
            pose.keypoints,
            0.5,
            ctx
        );

        tmPose.drawSkeleton(
            pose.keypoints,
            0.5,
            ctx
        );
    }
}

function stopCamera(){

    if(webcam)
        webcam.stop();

    isRunning=false;

    document.getElementById(
        "canvas-container"
    ).innerHTML="";

    document.getElementById(
        "label-container"
    ).innerHTML="";

    topResult.innerText="대기중...";
    statusDiv.innerText="카메라 종료";

    document.getElementById(
        "start-btn"
    ).disabled=false;
}
</script>

</body>
</html>
